name: Release

on:
  push:
    branches:
      - main
  # Manual trigger from the Actions tab — useful on a fork (where the push
  # event may not auto-run) and for re-releasing without a new commit. The
  # version defaults to apps/cli/package.json when left blank.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (x.y.z). Blank = use apps/cli/package.json."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release to GitHub Packages
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          check-latest: true
          package-manager-cache: false

      # Redirect only the @sciam-fr scope to GitHub Packages and leave the
      # default npm registry alone (public deps must still resolve normally).
      # The ${NODE_AUTH_TOKEN} placeholder is expanded by npm at runtime — the
      # token is never written to disk.
      - name: Configure GitHub Packages auth (scoped to @sciam-fr)
        run: |
          cat > "$HOME/.npmrc" <<'EOF'
          @sciam-fr:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF

      # Resolve the version from (in order): the manual workflow_dispatch input,
      # the chore(release): commit subject, then apps/cli/package.json.
      - name: Resolve version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(git log -1 --pretty=%s | sed -nE 's/^chore\(release\): ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./apps/cli/package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format '$VERSION'. Expected semver (x.y.z)"
            exit 1
          fi

      - name: Check if version already exists
        id: check-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view @sciam-fr/create-better-s-stack@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already exists on GitHub Packages"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Bun
        if: steps.check-version.outputs.exists == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        if: steps.check-version.outputs.exists == 'false'
        run: bun install --frozen-lockfile

      # tsdown bundles @better-s-stack/types and @better-s-stack/template-generator
      # into the CLI artifact (GitHub Packages only allows the repo-owner scope,
      # so those internal packages are never published). Turbo builds the
      # workspace deps first (build dependsOn ^build), producing a self-contained
      # dist in a single step.
      - name: Build CLI (bundles internal packages)
        if: steps.check-version.outputs.exists == 'false'
        run: bun run build:cli
        env:
          BTS_TELEMETRY: 1
          CONVEX_INGEST_URL: ${{ secrets.CONVEX_INGEST_URL }}

      - name: Set version and strip bundled workspace devDeps
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd apps/cli
          # The internal packages are inlined into dist, so the published manifest
          # must not carry workspace: protocol refs that npm can't resolve.
          jq --arg v "$VERSION" '
            .version = $v
            | del(.devDependencies["@better-s-stack/types"])
            | del(.devDependencies["@better-s-stack/template-generator"])
          ' package.json > tmp.json && mv tmp.json package.json

      # Gate the publish on the smoke so a broken artifact never reaches the
      # registry (missing files, broken bin entry, import failures, etc.).
      - name: Publish smoke test (npm, pnpm, bun)
        if: steps.check-version.outputs.exists == 'false'
        run: bun run smoke:publish

      - name: Publish CLI to GitHub Packages
        if: steps.check-version.outputs.exists == 'false'
        run: cd apps/cli && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BTS_TELEMETRY: 1
          CONVEX_INGEST_URL: ${{ secrets.CONVEX_INGEST_URL }}

      - name: Create and push tag
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config --local user.email "amanvarshney.work@gmail.com"
          git config --local user.name "Aman Varshney"
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push --tags
          else
            echo "Tag v$VERSION already exists, skipping"
          fi

      - name: Create GitHub Release
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! gh release view "v$VERSION" >/dev/null 2>&1; then
            bunx changelogithub
          else
            echo "Release v$VERSION already exists, skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        if: steps.check-version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Release v$VERSION Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Package" >> $GITHUB_STEP_SUMMARY
          echo "- \`@sciam-fr/create-better-s-stack@$VERSION\` → [GitHub Packages](https://github.com/${{ github.repository }}/pkgs/npm/create-better-s-stack)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "[v$VERSION](https://github.com/${{ github.repository }}/releases/tag/v$VERSION)" >> $GITHUB_STEP_SUMMARY
